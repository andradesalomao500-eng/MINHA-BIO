<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensi Atualizada - Vídeo de Fundo</title>
    <style>
        /* Fundo preto total e centralização */
        body {
            background-color: black;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center; /* Centraliza verticalmente na tela */
            min-height: 100vh;
            overflow: hidden; /* Impede rolagem da página principal */
            font-family: Arial, sans-serif;
            color: white;
            position: relative; /* Necessário para o vídeo de fundo */
        }

        /* Configuração do Vídeo de Fundo */
        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Faz o vídeo preencher a tela sem distorcer */
            z-index: -1; /* Coloca o vídeo atrás de todo o conteúdo */
            pointer-events: none; /* TORNA O VÍDEO NÃO INTERATIVO (NÃO PODE PAUSAR) */
        }

        /* Container principal para o conteúdo que fica SOBRE o vídeo */
        .content-overlay {
            position: relative; /* Garante que fique acima do vídeo */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 480px;
            z-index: 10; /* Acima do vídeo */
        }

        /* O elemento que sobrepõe (botão SENSI ATUALIZADA) */
        .over-layer {
            display: flex;
            align-items: center;
            background-color: rgba(0, 255, 0, 0.9); /* Verde neon quase opaco */
            border-radius: 5px;
            padding: 8px 12px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.7);
            margin-top: 20px; /* Dá um pequeno espaço no topo */
        }

        .header-foto-small {
            width: 30px;
            height: 30px;
            object-fit: cover;
            margin-right: 10px;
            border: 1px solid white;
        }

        .sensi-text {
            font-size: 1.1rem;
            font-weight: bold;
            color: black;
            text-transform: uppercase;
        }

        /* O Modal (janela de Sensi) - Começa invisível */
        .sensi-modal {
            display: none; /* Escondido por padrão */
            position: fixed; /* Fica fixo na tela */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95); /* Fundo preto quase opaco */
            z-index: 100; /* Acima de tudo */
            justify-content: center;
            align-items: center;
            color: #00ff00; /* Texto Verde Neon */
            font-family: 'Courier New', Courier, monospace; /* Fonte tipo código/matrix */
            font-weight: bold;
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        .sensi-content {
            text-align: left;
            border: 2px solid #00ff00;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 30px #00ff00;
        }

        /* Botão para fechar o modal */
        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            color: #00ff00;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="OVIDEO.mp4" type="video/mp4">
        Seu navegador não suporta vídeos HTML5.
    </video>

    <div class="content-overlay">

        <div class="over-layer" onclick="mostrarSensi()">
            <img src="FOTO_PEQUENA.jpg" alt="Foto Pequena" class="header-foto-small">
            <span class="sensi-text">SENSI ATUALIZADA</span>
        </div>

    </div>

    <div id="sensiModal" class="sensi-modal">
        <span class="close-modal" onclick="fecharSensi()">&times;</span>
        <div class="sensi-content">
            GERAL: 189<br>
            2X: 190<br>
            4X: 199<br>
            READSHOT: 99<br>
            AWM: 55
        </div>
    </div>

    <script>
        function mostrarSensi() {
            document.getElementById('sensiModal').style.display = 'flex';
        }

        function fecharSensi() {
            document.getElementById('sensiModal').style.display = 'none';
        }

        // Fecha o modal ao clicar fora do conteúdo
        window.onclick = function(event) {
            var modal = document.getElementById('sensiModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>

</body>
</html>
