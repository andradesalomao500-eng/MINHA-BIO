<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensi Atualizada - Capa Fixa</title>
    <style>
        /* Estilo para garantir fundo preto total e centralização */
        body {
            background-color: black;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Alinha no topo para que a capa não fique muito para baixo */
            min-height: 100vh;
            color: white; /* Cor padrão para qualquer texto caso precise */
            font-family: Arial, sans-serif;
            overflow: hidden; /* Impede qualquer barra de rolagem */
        }

        /* Container que envolve tudo para centralização */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 480px; /* Largura máxima para celulares */
            padding-top: 20px; /* Espaço pequeno no topo */
        }

        /* O elemento que sobrepõe a capa (quadradinho de foto e texto) */
        .over-layer {
            display: flex;
            align-items: center; /* Alinha o quadradinho de foto e o texto verticalmente */
            background-color: rgba(0, 255, 0, 0.7); /* Verde neon semi-transparente para destaque */
            border-radius: 5px; /* Bordas arredondadas leves */
            padding: 8px 12px;
            margin-bottom: 10px; /* Espaço para a capa abaixo */
            cursor: pointer; /* Indica que é clicável */
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5); /* Efeito neon sutil */
        }

        /* O quadradinho da foto pequena */
        .header-foto-small {
            width: 30px; /* Tamanho bem pequeno */
            height: 30px;
            object-fit: cover; /* Garante que a foto preencha o quadrado */
            margin-right: 10px; /* Espaço para o texto */
            border: 1px solid white; /* Borda branca fina para destacar */
        }

        /* O texto "SENSI ATUALIZADA" */
        .sensi-text {
            font-size: 1.1rem;
            font-weight: bold;
            color: black; /* Texto preto para contrastar com o fundo verde */
            text-transform: uppercase;
        }

        /* A capa principal (árvore) - Totalmente fixa e não clicável */
        .capa-fixa {
            width: 100%; /* Preenche a largura do container */
            max-width: 400px; /* Tamanho da imagem que você mandou */
            height: auto; /* Mantém a proporção */
            border-radius: 12px; /* Cantos arredondados como na imagem original */
            pointer-events: none; /* TORNA A IMAGEM NÃO CLICÁVEL E SEM PLAYER */
        }

    </style>
</head>
<body>

    <div class="container">

        <div class="over-layer">
            <img src="FOTO_PEQUENA.jpg" alt="Foto Pequena" class="header-foto-small">
            
            <span class="sensi-text">SENSI ATUALIZADA</span>
        </div>

        <img src="CAPA.jpg" alt="Capa Sensi" class="capa-fixa">

    </div>

</body>
</html>
